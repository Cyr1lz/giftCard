<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gift Card Validator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }


    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .container {
        background: white;
        padding: 2rem;
        border-radius: 20px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 450px;
        text-align: center;
    }

    .header {
        margin-bottom: 2rem;
    }

    .header h1 {
        color: #333;
        font-size: 2rem;
        margin-bottom: 0.5rem;
    }

    .header p {
        color: #666;
        font-size: 1rem;
    }

    .form-group {
        margin-bottom: 1.5rem;
        text-align: left;
    }

    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        color: #333;
        font-weight: 500;
    }

    .form-group input {
        width: 100%;
        padding: 1rem;
        border: 2px solid #e1e5e9;
        border-radius: 10px;
        font-size: 1rem;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .form-group input:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .validate-btn {
        width: 100%;
        padding: 1rem;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-bottom: 1.5rem;
    }

    .validate-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
    }

    .validate-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
    }

    .result {
        padding: 1rem;
        border-radius: 10px;
        font-weight: 600;
        font-size: 1.1rem;
        margin-bottom: 1rem;
        display: none;
    }

    .result.accepted {
        background-color: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
    }

    .result.declined {
        background-color: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
    }

    .result.pending {
        background-color: #fff3cd;
        color: #856404;
        border: 1px solid #ffeaa7;
    }

    .error {
        background-color: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
    }

    .admin-link {
        margin-top: 2rem;
        padding-top: 1.5rem;
        border-top: 1px solid #e1e5e9;
    }

    .admin-link a {
        color: #667eea;
        text-decoration: none;
        font-weight: 500;
    }

    .admin-link a:hover {
        text-decoration: underline;
    }

    .loading {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: #fff;
        animation: spin 1s ease-in-out infinite;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    .format-hint {
        font-size: 0.85rem;
        color: #666;
        margin-top: 0.5rem;
    }

    @media (max-width: 480px) {
        .container {
            margin: 1rem;
            padding: 1.5rem;
        }
        
        .header h1 {
            font-size: 1.5rem;
        }
    }
</style>


</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎁 Gift Card Validator</h1>
            <p>Enter your 16-character gift card code to check its status</p>
        </div>

    <form id="validateForm">
        <div class="form-group">
            <label for="giftCardCode">Gift Card Code</label>
            <input 
                type="text" 
                id="giftCardCode" 
                name="code" 
                placeholder="Enter your 16-character code"
                maxlength="16"
                required
            >
            <div class="format-hint">
                Must be exactly 16 characters (letters and numbers only)
            </div>
        </div>

        <button type="submit" class="validate-btn" id="validateBtn">
            Validate Gift Card
        </button>
    </form>

    <div id="result" class="result"></div>

    <div class="admin-link">
        <a href="/admin">Admin Panel</a>
    </div>
</div>

<script>
    const form = document.getElementById('validateForm');
    const input = document.getElementById('giftCardCode');
    const button = document.getElementById('validateBtn');
    const result = document.getElementById('result');

    // Format input as user types
    input.addEventListener('input', function(e) {
        this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
        
        // Hide previous results when typing
        result.style.display = 'none';
        result.className = 'result';
    });

    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const code = input.value.trim();
        
        // Validate format
        if (!code || code.length !== 16 || !/^[A-Z0-9]{16}$/.test(code)) {
            showResult('error', '❌ Invalid format. Please enter exactly 16 characters (letters and numbers only).');
            return;
        }

        // Show loading state
        button.disabled = true;
        button.innerHTML = '<span class="loading"></span> Validating...';

        try {
            const response = await fetch('/api/validate', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ code })
            });

            const data = await response.json();

            if (response.ok) {
                const statusMap = {
                    'accepted': '✅ Accepted',
                    'declined': '❌ Declined',
                    'pending': '⏳ Pending'
                };
                
                showResult(data.status, statusMap[data.status] || data.status);
            } else {
                showResult('error', data.error || 'Validation failed');
            }
        } catch (error) {
            showResult('error', 'Network error. Please try again.');
        } finally {
            // Reset button
            button.disabled = false;
            button.innerHTML = 'Validate Gift Card';
        }
    });

    function showResult(type, message) {
        result.className = `result ${type}`;
        result.textContent = message;
        result.style.display = 'block';
    }
</script>


</body>
</html>
