```
    <form id="validateForm">
        <div class="form-group">
            <label for="giftCardCode">Gift Card Code</label>
            <input 
                type="text" 
                id="giftCardCode" 
                name="code" 
                placeholder="Enter your 16-character code"
                maxlength="16"
                required
            >
            <div class="format-hint">
                Must be exactly 16 characters (letters and numbers only)
            </div>
        </div>

        <button type="submit" class="validate-btn" id="validateBtn">
            Validate Gift Card
        </button>
    </form>

    <div id="result" class="result"></div>

    <div class="examples">
        <h4>Example Format:</h4>
        <code>ABC123XYZ4567890</code>
        <code>1A2B3C4D5E6F7G8H</code>
    </div>

    <div class="admin-link">
        <a href="admin.html">🔐 Admin Panel</a>
    </div>
</div>

<script>
    // Shared storage key
    const STORAGE_KEY = 'giftCardValidator';

    // Initialize data
    function initData() {
        if (!localStorage.getItem(STORAGE_KEY)) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({}));
        }
    }

    // Get all cards
    function getCards() {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    }

    // Save cards
    function saveCards(cards) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(cards));
    }

    const form = document.getElementById('validateForm');
    const input = document.getElementById('giftCardCode');
    const button = document.getElementById('validateBtn');
    const result = document.getElementById('result');

    // Format input as user types
    input.addEventListener('input', function(e) {
        this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
        
        // Hide previous results when typing
        result.style.display = 'none';
        result.className = 'result';
    });

    // Form submission
    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const code = input.value.trim();
        
        // Validate format
        if (!code || code.length !== 16 || !/^[A-Z0-9]{16}$/.test(code)) {
            showResult('error', '❌ Invalid format. Please enter exactly 16 characters (letters and numbers only).');
            return;
        }

        // Show loading state
        button.disabled = true;
        button.innerHTML = '<span class="loading"></span> Validating...';

        // Simulate API delay
        setTimeout(() => {
            const cards = getCards();
            
            // If card doesn't exist, create it with pending status
            if (!cards[code]) {
                cards[code] = {
                    code: code,
                    status: 'pending',
                    createdAt: new Date().toISOString()
                };
                saveCards(cards);
            }
            
            const statusMap = {
                'accepted': '✅ Accepted',
                'declined': '❌ Declined',
                'pending': '⏳ Pending'
            };
            
            showResult(cards[code].status, statusMap[cards[code].status]);
            
            // Reset button
            button.disabled = false;
            button.innerHTML = 'Validate Gift Card';
        }, 1000);
    });

    function showResult(type, message) {
        result.className = `result ${type}`;
        result.textContent = message;
        result.style.display = 'block';
    }

    // Initialize the app
    initData();
</script>
