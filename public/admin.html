<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Gift Card Validator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }


    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 2rem;
    }

    .container {
        max-width: 1200px;
        margin: 0 auto;
    }

    .login-container {
        background: white;
        padding: 2rem;
        border-radius: 20px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        max-width: 400px;
        margin: 0 auto;
        text-align: center;
    }

    .admin-panel {
        background: white;
        border-radius: 20px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        overflow: hidden;
        display: none;
    }

    .admin-header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .admin-header h1 {
        font-size: 1.8rem;
    }

    .logout-btn {
        background: rgba(255, 255, 255, 0.2);
        color: white;
        border: 1px solid rgba(255, 255, 255, 0.3);
        padding: 0.5rem 1rem;
        border-radius: 8px;
        cursor: pointer;
        font-size: 0.9rem;
    }

    .logout-btn:hover {
        background: rgba(255, 255, 255, 0.3);
    }

    .form-group {
        margin-bottom: 1.5rem;
        text-align: left;
    }

    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        color: #333;
        font-weight: 500;
    }

    .form-group input {
        width: 100%;
        padding: 1rem;
        border: 2px solid #e1e5e9;
        border-radius: 10px;
        font-size: 1rem;
        transition: all 0.3s ease;
    }

    .form-group input:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .login-btn, .btn {
        width: 100%;
        padding: 1rem;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .login-btn:hover, .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
    }

    .cards-section {
        padding: 2rem;
    }

    .cards-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
    }

    .refresh-btn {
        width: auto;
        padding: 0.5rem 1rem;
        font-size: 0.9rem;
    }

    .cards-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 1rem;
    }

    .cards-table th,
    .cards-table td {
        padding: 1rem;
        text-align: left;
        border-bottom: 1px solid #e1e5e9;
    }

    .cards-table th {
        background-color: #f8f9fa;
        font-weight: 600;
        color: #333;
    }

    .cards-table tr:hover {
        background-color: #f8f9fa;
    }

    .status-select {
        padding: 0.5rem;
        border: 2px solid #e1e5e9;
        border-radius: 6px;
        background-color: white;
        cursor: pointer;
    }

    .status-select:focus {
        outline: none;
        border-color: #667eea;
    }

    .status-badge {
        padding: 0.25rem 0.5rem;
        border-radius: 4px;
        font-size: 0.85rem;
        font-weight: 500;
    }

    .status-accepted {
        background-color: #d4edda;
        color: #155724;
    }

    .status-declined {
        background-color: #f8d7da;
        color: #721c24;
    }

    .status-pending {
        background-color: #fff3cd;
        color: #856404;
    }

    .empty-state {
        text-align: center;
        padding: 3rem;
        color: #666;
    }

    .empty-state-icon {
        font-size: 3rem;
        margin-bottom: 1rem;
    }

    .error {
        background-color: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
        padding: 1rem;
        border-radius: 8px;
        margin-bottom: 1rem;
    }

    .back-link {
        margin-top: 2rem;
        text-align: center;
    }

    .back-link a {
        color: #667eea;
        text-decoration: none;
        font-weight: 500;
    }

    .back-link a:hover {
        text-decoration: underline;
    }

    .loading {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 3px solid rgba(102, 126, 234, 0.3);
        border-radius: 50%;
        border-top-color: #667eea;
        animation: spin 1s ease-in-out infinite;
        margin-right: 0.5rem;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    @media (max-width: 768px) {
        body {
            padding: 1rem;
        }

        .cards-table {
            font-size: 0.9rem;
        }

        .cards-table th,
        .cards-table td {
            padding: 0.5rem;
        }

        .admin-header {
            flex-direction: column;
            gap: 1rem;
            text-align: center;
        }
    }
</style>

</head>
<body>
    <div class="container">
        <!-- Login Form -->
        <div id="loginContainer" class="login-container">
            <h2>🔐 Admin Login</h2>
            <p style="margin-bottom: 2rem; color: #666;">Enter your credentials to access the admin panel</p>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit" class="login-btn" id="loginBtn">
                Login
            </button>
        </form>

        <div id="loginError" class="error" style="display: none;"></div>

        <div class="back-link">
            <a href="/">← Back to Gift Card Validator</a>
        </div>

        <div style="margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #e1e5e9; font-size: 0.9rem; color: #666;">
            <strong>Demo Credentials:</strong><br>
            Username: admin<br>
            Password: admin123
        </div>
    </div>

    <!-- Admin Panel -->
    <div id="adminPanel" class="admin-panel">
        <div class="admin-header">
            <h1>🎛️ Admin Dashboard</h1>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>

        <div class="cards-section">
            <div class="cards-header">
                <h3>Gift Card Management</h3>
                <button class="btn refresh-btn" id="refreshBtn">
                    🔄 Refresh
                </button>
            </div>

            <div id="cardsContainer">
                <div class="empty-state">
                    <div class="empty-state-icon">📦</div>
                    <p>No gift cards submitted yet</p>
                    <small>Cards will appear here when customers validate them</small>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const loginContainer = document.getElementById('loginContainer');
    const adminPanel = document.getElementById('adminPanel');
    const loginForm = document.getElementById('loginForm');
    const loginError = document.getElementById('loginError');
    const cardsContainer = document.getElementById('cardsContainer');
    const refreshBtn = document.getElementById('refreshBtn');
    const logoutBtn = document.getElementById('logoutBtn');

    // Login form submission
    loginForm.addEventListener('submit', async function(e) {
        e.preventDefault();

        const loginBtn = document.getElementById('loginBtn');
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        loginBtn.disabled = true;
        loginBtn.innerHTML = '<span class="loading"></span> Logging in...';

        try {
            const response = await fetch('/api/admin/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ username, password })
            });

            if (response.ok) {
                loginContainer.style.display = 'none';
                adminPanel.style.display = 'block';
                loadCards();
            } else {
                const data = await response.json();
                showLoginError(data.error || 'Login failed');
            }
        } catch (error) {
            showLoginError('Network error. Please try again.');
        } finally {
            loginBtn.disabled = false;
            loginBtn.innerHTML = 'Login';
        }
    });

    // Logout
    logoutBtn.addEventListener('click', async function() {
        try {
            await fetch('/api/admin/logout', { method: 'POST' });
        } catch (error) {
            console.error('Logout error:', error);
        } finally {
            adminPanel.style.display = 'none';
            loginContainer.style.display = 'block';
            loginForm.reset();
            loginError.style.display = 'none';
        }
    });

    // Refresh cards
    refreshBtn.addEventListener('click', loadCards);

    // Load cards from server
    async function loadCards() {
        const originalText = refreshBtn.innerHTML;
        refreshBtn.innerHTML = '<span class="loading"></span> Loading...';
        refreshBtn.disabled = true;

        try {
            const response = await fetch('/api/admin/cards');
            
            if (!response.ok) {
                throw new Error('Failed to load cards');
            }

            const cards = await response.json();
            displayCards(cards);
        } catch (error) {
            console.error('Error loading cards:', error);
            cardsContainer.innerHTML = '<div class="error">Failed to load cards. Please try again.</div>';
        } finally {
            refreshBtn.innerHTML = originalText;
            refreshBtn.disabled = false;
        }
    }

    // Display cards in table
    function displayCards(cards) {
        if (cards.length === 0) {
            cardsContainer.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">📦</div>
                    <p>No gift cards submitted yet</p>
                    <small>Cards will appear here when customers validate them</small>
                </div>
            `;
            return;
        }

        const tableHTML = `
            <table class="cards-table">
                <thead>
                    <tr>
                        <th>Gift Card Code</th>
                        <th>Status</th>
                        <th>Created</th>
                        <th>Last Updated</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    ${cards.map(card => `
                        <tr>
                            <td><code>${card.code}</code></td>
                            <td>
                                <span class="status-badge status-${card.status}">
                                    ${getStatusIcon(card.status)} ${card.status.toUpperCase()}
                                </span>
                            </td>
                            <td>${formatDate(card.createdAt)}</td>
                            <td>${card.updatedAt ? formatDate(card.updatedAt) : '-'}</td>
                            <td>
                                <select class="status-select" onchange="updateCardStatus('${card.code}', this.value)">
                                    <option value="pending" ${card.status === 'pending' ? 'selected' : ''}>⏳ Pending</option>
                                    <option value="accepted" ${card.status === 'accepted' ? 'selected' : ''}>✅ Accepted</option>
                                    <option value="declined" ${card.status === 'declined' ? 'selected' : ''}>❌ Declined</option>
                                </select>
                            </td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        `;

        cardsContainer.innerHTML = tableHTML;
    }

    // Update card status
    async function updateCardStatus(code, status) {
        try {
            const response = await fetch(`/api/admin/cards/${code}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ status })
            });

            if (response.ok) {
                loadCards(); // Refresh the table
            } else {
                alert('Failed to update card status');
            }
        } catch (error) {
            console.error('Error updating card:', error);
            alert('Network error. Please try again.');
        }
    }

    // Helper functions
    function showLoginError(message) {
        loginError.textContent = message;
        loginError.style.display = 'block';
    }

    function getStatusIcon(status) {
        const icons = {
            'accepted': '✅',
            'declined': '❌',
            'pending': '⏳'
        };
        return icons[status] || '';
    }

    function formatDate(dateString) {
        if (!dateString) return '-';
        const date = new Date(dateString);
        return date.toLocaleDateString() + ' ' + date.toLocaleTimeString();
    }

    // Make updateCardStatus globally available
    window.updateCardStatus = updateCardStatus;
</script>


</body>
</html>
